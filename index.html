<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moscow Transit Rush: Live Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Responsive Viewport Frame */
        .viewport-map-frame {
            position: relative;
            overflow: auto;
            width: 100%;
            height: 65vh;
            background-color: #020617;
            cursor: grab;
        }
        .viewport-map-frame:active { cursor: grabbing; }
        
        /* Map Canvas Outer Wrapper */
        .map-canvas-container {
            position: relative;
            transform-origin: top left;
            transition: transform 0.1s ease-out;
            width: 2400px; /* Base structural anchoring size matching your image asset scale */
        }
        
        /* Fixed absolute layer for pin coordinates */
        #pins-interaction-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows click events to pass down to map image */
            z-index: 50;
        }

        /* 1) Dynamic Fix: Pin styling overrides */
        .station-pin {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            pointer-events: auto; /* Re-enables clicking explicitly on the pins */
            transition: transform 0.15s;
        }
        .station-pin:hover { transform: translate(-50%, -50%) scale(1.25); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased select-none">

    <div class="bg-slate-950 p-2 text-xs border-b border-slate-800 flex justify-between items-center px-4">
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse" id="sync-indicator"></span>
            <input type="text" id="room-id-input" placeholder="Shared Room Name" class="bg-slate-800 border border-slate-700 px-2 py-1 rounded text-slate-200 w-40 focus:outline-none focus:border-teal-500" value="moscow-clash-1">
            <button onclick="initializeLiveSync()" class="bg-teal-600 hover:bg-teal-500 px-3 py-1 rounded font-bold text-white transition">Connect Live</button>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-slate-400 font-medium">Mode:</span>
            <button id="mode-toggle-btn" onclick="toggleMode()" class="bg-amber-600 px-3 py-1 rounded font-bold text-white">SETUP MODE</button>
        </div>
    </div>

    <header class="bg-slate-800/95 backdrop-blur border-b border-slate-700 p-3 shadow-md sticky top-0 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="text-center bg-red-950/30 p-2 rounded-xl border border-red-500/40 w-5/12">
                <div class="text-xs font-bold text-red-400 uppercase tracking-wide">Player 1</div>
                <div class="flex justify-around items-center mt-1">
                    <div>
                        <span class="block text-2xl font-black text-red-500" id="hud-p1-chips">20</span>
                        <span class="text-[9px] text-slate-400 tracking-wider">CHIPS</span>
                    </div>
                    <div class="border-l border-slate-700 h-6"></div>
                    <div>
                        <span class="block text-2xl font-black" id="hud-p1-stations">0</span>
                        <span class="text-[9px] text-slate-400 tracking-wider">STATIONS</span>
                    </div>
                </div>
            </div>

            <div class="text-slate-500 font-black italic text-sm">VS</div>

            <div class="text-center bg-blue-950/30 p-2 rounded-xl border border-blue-500/40 w-5/12">
                <div class="text-xs font-bold text-blue-400 uppercase tracking-wide">Player 2</div>
                <div class="flex justify-around items-center mt-1">
                    <div>
                        <span class="block text-2xl font-black text-blue-500" id="hud-p2-chips">20</span>
                        <span class="text-[9px] text-slate-400 tracking-wider">CHIPS</span>
                    </div>
                    <div class="border-l border-slate-700 h-6"></div>
                    <div>
                        <span class="block text-2xl font-black" id="hud-p2-stations">0</span>
                        <span class="text-[9px] text-slate-400 tracking-wider">STATIONS</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-2 space-y-4">
        
        <div class="bg-slate-800 p-2 rounded-xl border border-slate-700 flex justify-between items-center px-4 shadow-sm">
            <span class="text-xs text-slate-400 font-medium" id="status-hint">Setup Mode: Click map location to drop a predefined station marker.</span>
            <div class="flex items-center gap-3">
                <span class="text-xs text-slate-400 font-bold">Zoom Scale:</span>
                <input type="range" id="zoomSlider" min="0.3" max="2.0" step="0.05" value="0.6" oninput="applyZoomFactor()" class="w-28 accent-teal-500">
                <span class="text-xs font-mono font-bold bg-slate-900 px-1.5 py-0.5 rounded text-teal-400" id="zoomValue">60%</span>
            </div>
        </div>

        <div class="viewport-map-frame rounded-2xl border-2 border-slate-700 shadow-2xl" id="mapFrame">
            <div class="map-canvas-container" id="mapCanvas">
                <img src="map.jpg" alt="Moscow Rail System Canvas Map" class="w-full max-w-none block pointer-events-auto select-none" id="baseMapImg" onclick="handleCanvasInteraction(event)">
                <div id="pins-interaction-layer"></div>
            </div>
        </div>

        <section class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
            <h3 class="text-xs font-bold uppercase tracking-widest text-teal-400 mb-3 flex justify-between items-center">
                <span>Active Station Registry (Alphabetical Order)</span>
                <span id="registry-counter" class="bg-slate-900 text-slate-400 px-2 py-0.5 rounded text-[10px] font-mono">0 Loaded</span>
            </h3>
            <div id="registry-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 text-xs">
                <div class="text-slate-500 italic col-span-full py-2">No stations assigned to map yet. Use Setup Mode above.</div>
            </div>
        </section>
    </main>

    <script>
        // Pre-populated Master Registry Source Array Checklist
        const MASTER_STATIONS_REGISTRY = [
            "Авиамоторная", "Автозаводская", "Академическая", "Алексеевская", "Алма-Атинская", "Алтуфьево", "Аминьевская", "Андроновка", "Аннино", "Апрелевка", "Арбатская", "Аэропорт", "Бабушкинская", "Багратионовская", "Баковка", "Балтийская", "Баррикадная", "Бауманская", "Беговая", "Белокаменная", "Беломорская", "Белорусская", "Бескудниково", "Бибирево", "Библиотека им. Ленина", "Битцевский парк", "Борисово", "Боровское шоссе", "Боровицкая", "Ботанический сад", "Братиславская", "Бульвар Адмирала Ушакова", "Бульвар Дмитрия Донского", "Бульвар Рокоссовского", "Бунинская аллея", "Бутырская", "Варшавская", "ВДНХ", "Верхние Лихоборы", "Вешняки", "Владыкино", "Водный стадион", "Войковская", "Волгоградский проспект", "Волжская", "Волоколамская", "Воробьёвы горы", "Воронцовская", "Выхино", "Генерала Тюленева", "Говорово", "Грачёвская", "Давыдково", "Дегунино", "Деловой центр", "Динамо", "Дмитровская", "Добрынинская", "Долгопрудная", "Достоевская", "Дубровка", "Жулебино", "Зеленоград-Крюково", "Зюзино", "Измайлово", "Калужская", "Кантемировская", "Каширская", "Киевская", "Китай-город", "Кленовый бульвар", "Кожуховская", "Коломенская", "Комсомольская", "Коньково", "Коптево", "Косино", "Котельники", "Красногвардейская", "Красные Ворота", "Крестьянская Застава", "Крылатское", "Крымская", "Кузнецкий Мост", "Кузьминки", "Кунцевская", "Курская", "Кутузовская", "Ленинский проспект", "Лефортово", "Лианозово", "Лихоборы", "Лобня", "Локомотив", "Ломоносовский проспект", "Лубянка", "Лужники", "Люблино", "Марксистская", "Марьина Роща", "Марьино", "Маяковская", "Медведково", "Менделеевская", "Митино", "Мичуринский проспект", "Молодёжная", "Москва-Сити", "Москворечье", "Нагатинская", "Нагорная", "Нахабино", "Нахимовский проспект", "Некрасовка", "Нижегородская", "Новаторская", "Новогиреево", "Новокосино", "Новослободская", "Новоясеневская", "Новые Черёмушки", "Одинцово", "Окружная", "Октябрьская", "Октябрьское Поле", "Орехово", "Отрадное", "Охотный Ряд", "Очаково", "Павелецкая", "Панфиловская", "Парк Победы", "Парк культуры", "Партизанская", "Первомайская", "Перово", "Петровско-Разумовская", "Печатники", "Пионерская", "Планерная", "Площадь Ильича", "Площадь Революции", "Площадь Суворова", "Полежаевская", "Полянка", "Пражская", "Преображенская площадь", "Пролетарская", "Проспект Вернадского", "Проспект Мира", "Профсоюзная", "Пушкинская", "Раменки", "Рассказовка", "Речной вокзал", "Рижская", "Ростокино", "Румянцево", "Рязанский проспект", "Савёловская", "Саларьево", "Свиблово", "Севастопольская", "Селигерская", "Семёновская", "Серпуховская", "Славянский бульвар", "Смоленская", "Сокол", "Соколиная Гора", "Сокольники", "Солнечная", "Solntsevo", "Спартак", "Спортивная", "Сретенский бульвар", "Стахановская", "Строгино", "Сухаревская", "Таганская", "Тверская", "Театральная", "Текстильщики", "Тёплый Стан", "Технопарк", "Тимирязевская", "Тропарёво", "Трубная", "Тульская", "Тургеневская", "Тушинская", "Угрешская", "Улица 1905 года", "Улица Академика Янгеля", "Улица Дмитриевского", "Университет", "Физтех", "Фили", "Филёвский парк", "Фрунзенская", "Ховрино", "Хорошёво", "Хорошёвская", "Царицыно", "ЦСКА", "Чеховская", "Черкизовская", "Чертановская", "Чкаловская", "Шаболовская", "Шелепиха", "Шоссе Энтузиастов", "Щёлковская", "Щукинская", "Электрозаводская", "Юго-Восточная", "Юго-Западная", "Южная", "Ясенево", "Яхромская"
        ];

        let isSetupMode = true;
        let gameRoomId = "moscow-clash-1";
        let localState = {
            players: { 1: { chips: 20, stationsCount: 0 }, 2: { chips: 20, stationsCount: 0 } },
            boundPins: []
        };

        document.addEventListener("DOMContentLoaded", () => {
            applyZoomFactor();
            renderActiveOverlayPins();
            
            // Drag and scroll mapping logic initialization 
            const slider = document.getElementById('mapFrame');
            let isDown = false; let startX, startY, scrollLeft, scrollTop;
            slider.addEventListener('mousedown', (e) => {
                if (e.target.closest('.station-pin')) return;
                isDown = true; startX = e.pageX - slider.offsetLeft; startY = e.pageY - slider.offsetTop;
                scrollLeft = slider.scrollLeft; scrollTop = slider.scrollTop;
            });
            slider.addEventListener('mouseleave', () => isDown = false);
            slider.addEventListener('mouseup', () => isDown = false);
            slider.addEventListener('mousemove', (e) => {
                if(!isDown) return; e.preventDefault();
                const x = e.pageX - slider.offsetLeft; const y = e.pageY - slider.offsetTop;
                slider.scrollLeft = scrollLeft - (x - startX); slider.scrollTop = scrollTop - (y - startY);
            });
        });

        function applyZoomFactor() {
            const val = document.getElementById('zoomSlider').value;
            document.getElementById('zoomValue').textContent = `${Math.round(val * 100)}%`;
            document.getElementById('mapCanvas').style.transform = `scale(${val})`;
        }

        function toggleMode() {
            isSetupMode = !isSetupMode;
            const btn = document.getElementById('mode-toggle-btn');
            const hint = document.getElementById('status-hint');
            if (isSetupMode) {
                btn.textContent = "SETUP MODE"; btn.className = "bg-amber-600 px-3 py-1 rounded font-bold text-white";
                hint.textContent = "Setup Mode: Click map location to drop a predefined station marker.";
            } else {
                btn.textContent = "GAME ACTIVE"; btn.className = "bg-emerald-600 px-3 py-1 rounded font-bold text-white animate-pulse";
                hint.textContent = "Game Active Mode: Select markers to execute claims, flips, or track fares.";
            }
        }

        function handleCanvasInteraction(event) {
            if (!isSetupMode) return;
            const rect = document.getElementById('baseMapImg').getBoundingClientRect();
            // Store percentages relative strictly to image source geometry sizes
            const x = ((event.clientX - rect.left) / rect.width) * 100;
            const y = ((event.clientY - rect.top) / rect.height) * 100;

            let inputSearch = prompt("Type part of the Moscow station name to filter and select:");
            if (!inputSearch) return;

            let matches = MASTER_STATIONS_REGISTRY.filter(s => s.toLowerCase().includes(inputSearch.toLowerCase()));
            if (matches.length === 0) { alert("No matching station found in registry!"); return; }
            
            let promptText = "Select exact station index matching:\n";
            matches.forEach((m, idx) => { promptText += `${idx} - ${m}\n`; });
            let selectionIndex = parseInt(prompt(promptText, "0"));
            
            if (isNaN(selectionIndex) || selectionIndex < 0 || selectionIndex >= matches.length) { alert("Selection canceled."); return; }
            let chosenStationName = matches[selectionIndex];

            if (localState.boundPins.some(p => p.name === chosenStationName)) { alert("This station is already assigned on your system layout map!"); return; }

            const newPin = {
                id: 'station_' + Date.now(),
                x: x, y: y,
                name: chosenStationName,
                owner: null, // Neutral default constraint config
                chips: 0
            };

            localState.boundPins.push(newPin);
            renderActiveOverlayPins();
            pushStateToCloudRelay();
        }

        function handlePinInteraction(pinId) {
            const pin = localState.boundPins.find(p => p.id === pinId);
            if (!pin) return;

            if (isSetupMode) {
                if (confirm(`Remove station marker anchor for "${pin.name}"?`)) {
                    localState.boundPins = localState.boundPins.filter(p => p.id !== pinId);
                    renderActiveOverlayPins(); pushStateToCloudRelay();
                }
                return;
            }

            let activePromptText = `Station Selected: ${pin.name}\n`;
            activePromptText += `Current Alignment: ${pin.owner ? 'Player ' + pin.owner : 'Neutral (White)'}\n`;
            activePromptText += `Fortification Weight resting on Station: ${pin.chips} Chips\n\n`;
            activePromptText += `Choose action path index:\n1 - Claim / Flip as Player 1\n2 - Claim / Flip as Player 2\n3 - Process Pass-Through Rent/Fare\n4 - Reset Station to Neutral`;

            let gameSelection = prompt(activePromptText);
            if (!gameSelection) return;

            if (gameSelection === "1" || gameSelection === "2") {
                const currentPlayer = parseInt(gameSelection);
                
                if (pin.owner === null) {
                    let stake = parseInt(prompt("Enter initial chips to stake on this open station (Allowed bounds: 1 to 5 chips):", "1")) || 1;
                    if (stake < 1 || stake > 5) { alert("Error: Initial neutral claims must be balanced between 1 and 5 chips!"); return; }
                    if (localState.players[currentPlayer].chips < stake) { alert("Transaction Terminated: Insufficient chip wallet reserves!"); return; }
                    
                    localState.players[currentPlayer].chips -= stake;
                    pin.owner = currentPlayer;
                    pin.chips = stake;
                } else if (pin.owner === currentPlayer) {
                    let addChips = parseInt(prompt("Enter additional chips to add to your fortification (Max 5):", "1")) || 1;
                    if (addChips < 1 || addChips > 5) { alert("Must be between 1 and 5 chips."); return; }
                    if (localState.players[currentPlayer].chips < addChips) { alert("Insufficient chips!"); return; }
                    localState.players[currentPlayer].chips -= addChips;
                    pin.chips += addChips;
                } else {
                    let minFlip = pin.chips + 1;
                    let maxFlip = pin.chips + 5;
                    
                    let flipStakeInput = parseInt(prompt(`Station is held by enemy. Enter total chip stake to flip and fortify this asset (Enforced boundary limits: ${minFlip} to ${maxFlip} chips):`, minFlip.toString()));
                    
                    if (isNaN(flipStakeInput) || flipStakeInput < minFlip || flipStakeInput > maxFlip) {
                        alert(`Error: Flip stake fails validation bounds! Your input must be between ${minFlip} and ${maxFlip} total chips.`);
                        return;
                    }
                    
                    if (localState.players[currentPlayer].chips < flipStakeInput) { alert("Flipping Error: Insufficient tokens in active wallet balance tracker!"); return; }
                    
                    localState.players[currentPlayer].chips -= flipStakeInput;
                    pin.owner = currentPlayer;
                    pin.chips = flipStakeInput;
                }
            } else if (gameSelection === "3") {
                let traveler = parseInt(prompt("Which player is moving through this territory line block? (Type 1 or 2):"));
                if (traveler === 1 || traveler === 2) {
                    let beneficiary = traveler === 1 ? 2 : 1;
                    let rentDue = pin.chips;
                    
                    localState.players[traveler].chips -= rentDue;
                    localState.players[beneficiary].chips += rentDue;
                    alert(`Player ${traveler} processed a rent payload of ${rentDue} chips to Player ${beneficiary}. Balance shifted.`);
                }
            } else if (gameSelection === "4") {
                pin.owner = null; pin.chips = 0;
            }

            updateCalculationsAndRegistry();
            pushStateToCloudRelay();
        }

        // 1) Visual Fix: Ensure elements correctly apply layers dynamically on top of coordinates
        function renderActiveOverlayPins() {
            const container = document.getElementById('pins-interaction-layer');
            container.innerHTML = '';

            localState.boundPins.forEach(pin => {
                let node = document.createElement('div');
                node.className = 'station-pin';
                node.style.left = `${pin.x}%`;
                node.style.top = `${pin.y}%`;
                
                if (pin.owner === 1) {
                    node.style.backgroundColor = '#dc2626'; node.style.borderColor = '#ffffff'; node.style.color = '#ffffff';
                } else if (pin.owner === 2) {
                    node.style.backgroundColor = '#2563eb'; node.style.borderColor = '#ffffff'; node.style.color = '#ffffff';
                } else {
                    // White background circle with dark border contour and black font text indicator
                    node.style.backgroundColor = '#ffffff'; node.style.borderColor = '#1e293b'; node.style.color = '#000000';
                }

                node.textContent = pin.chips;
                node.title = pin.name;
                node.onclick = (e) => { e.stopPropagation(); handlePinInteraction(pin.id); };
                container.appendChild(node);
            });
        }

        // 2) Alphabetical sorting and display logic updates
        function updateCalculationsAndRegistry() {
            let p1Stations = 0, p2Stations = 0;
            
            // Build separate deeply cloned sorted array frame explicitly for display parsing matching rule 2
            let sortedPins = [...localState.boundPins].sort((a, b) => a.name.localeCompare(b.name, 'ru'));

            const registryList = document.getElementById('registry-list');
            document.getElementById('registry-counter').textContent = `${sortedPins.length} Anchored`;
            
            if(sortedPins.length === 0) {
                registryList.innerHTML = `<div class="text-slate-500 italic col-span-full py-2">No stations assigned to map yet. Use Setup Mode above.</div>`;
            } else {
                registryList.innerHTML = '';
                sortedPins.forEach(pin => {
                    if (pin.owner === 1) p1Stations++;
                    if (pin.owner === 2) p2Stations++;

                    let card = document.createElement('div');
                    card.className = "p-2 rounded-lg flex justify-between items-center transition ";
                    
                    if(pin.owner === 1) card.className += "bg-red-950/40 border border-red-800 text-red-200";
                    else if(pin.owner === 2) card.className += "bg-blue-950/40 border border-blue-800 text-blue-200";
                    else card.className += "bg-slate-900/60 border border-slate-700 text-slate-300";

                    card.innerHTML = `
                        <span class="font-medium truncate max-w-[150px]">${pin.name}</span>
                        <span class="font-mono text-[10px] font-bold px-1.5 py-0.5 rounded bg-slate-950">
                            ${pin.owner ? `P${pin.owner} • ${pin.chips}🪙` : `Neutral • 0`}
                        </span>
                    `;
                    card.onclick = () => { handlePinInteraction(pin.id); };
                    registryList.appendChild(card);
                });
            }

            localState.players[1].stationsCount = p1Stations;
            localState.players[2].stationsCount = p2Stations;

            document.getElementById('hud-p1-chips').textContent = localState.players[1].chips;
            document.getElementById('hud-p1-stations').textContent = p1Stations;
            document.getElementById('hud-p2-chips').textContent = localState.players[2].chips;
            document.getElementById('hud-p2-stations').textContent = p2Stations;
            
            renderActiveOverlayPins();
        }

        async function initializeLiveSync() {
            const inputVal = document.getElementById('room-id-input').value.trim();
            if(inputVal) gameRoomId = inputVal;
            document.getElementById('sync-indicator').className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
            
            await pullStateFromCloudRelay();
            setInterval(pullStateFromCloudRelay, 3000);
        }

        async function pushStateToCloudRelay() {
            try {
                await fetch(`https://keyvalue.immanual.xyz/api/keyv/${gameRoomId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(localState)
                });
            } catch (err) { console.warn("Sync delay:", err); }
        }

        async function pullStateFromCloudRelay() {
            try {
                const res = await fetch(`https://keyvalue.immanual.xyz/api/keyv/${gameRoomId}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.players && data.boundPins) {
                        localState = data;
                        updateCalculationsAndRegistry();
                    }
                }
            } catch (err) { console.warn("Relay listening context drop:", err); }
        }
    </script>
</body>
</html>
