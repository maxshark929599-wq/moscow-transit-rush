<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moscow Transit Rush: Live Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Responsive Viewport Frame */
        .viewport-map-frame {
            position: relative;
            overflow: auto;
            width: 100%;
            height: 65vh;
            background-color: #020617;
            cursor: grab;
        }
        .viewport-map-frame:active { cursor: grabbing; }
        
        /* Map Canvas Outer Wrapper */
        .map-canvas-container {
            position: relative;
            transform-origin: top left;
            transition: transform 0.1s ease-out;
            width: 2400px; /* Base structural anchoring size matching image asset scale */
        }
        
        /* Fixed absolute layer for pin coordinates */
        #pins-interaction-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows click events to pass down to map image */
            z-index: 50;
        }

        /* Pin styling overrides */
        .station-pin {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            pointer-events: auto; /* Re-enables clicking explicitly on the pins */
            transition: transform 0.15s;
        }
        .station-pin:hover { transform: translate(-50%, -50%) scale(1.25); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased select-none">

    <div class="bg-slate-950 p-2 text-xs border-b border-slate-800 flex flex-wrap justify-between items-center px-4 gap-2">
        <div class="flex flex-wrap items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse" id="sync-indicator"></span>
            <input type="text" id="room-id-input" placeholder="Shared Room Name" class="bg-slate-800 border border-slate-700 px-2 py-1 rounded text-slate-200 w-40 focus:outline-none focus:border-teal-500" value="moscow-clash-1">
            
            <label class="text-slate-400 font-medium ml-2">Your Role:</label>
            <select id="role-selector" onchange="handleRoleChange()" class="bg-slate-800 border border-slate-700 px-2 py-1 rounded text-slate-200 focus:outline-none focus:border-teal-500">
                <option value="player1">Player 1</option>
                <option value="player2">Player 2</option>
                <option value="admin">Admin (Map Creator)</option>
            </select>

            <button onclick="initializeLiveSync()" class="bg-teal-600 hover:bg-teal-500 px-3 py-1 rounded font-bold text-white transition">Force Reconnect</button>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-slate-400 font-medium">Engine State:</span>
            <span id="mode-status-badge" class="bg-emerald-600 px-3 py-1 rounded font-bold text-white">GAME ACTIVE</span>
        </div>
    </div>

    <header class="bg-slate-800/95 backdrop-blur border-b border-slate-700 p-3 shadow-md sticky top-0 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="text-center bg-red-950/30 p-2 rounded-xl border border-red-500/40 w-5/12">

                <div class="flex justify-around items-center mt-1">
                    <div>
                        <span class="block text-2xl font-black text-red-500" id="hud-p1-chips">20</span>
                        <span class="text-[9px] text-slate-400 tracking-wider">CHIPS</span>
                    </div>
                    <div class="border-l border-slate-700 h-6"></div>
                    <div>
                        <span class="block text-2xl font-black" id="hud-p1-stations">0</span>
                        <span class="text-[9px] text-slate-400 tracking-wider">STATIONS</span>
                    </div>
                </div>
            </div>

            <div class="text-slate-500 font-black italic text-sm">VS</div>

            <div class="text-center bg-blue-950/30 p-2 rounded-xl border border-blue-500/40 w-5/12">
                <div class="text-xs font-bold text-blue-400 uppercase tracking-wide">Player 2</div>
                <div class="flex justify-around items-center mt-1">
                    <div>
                        <span class="block text-2xl font-black text-blue-500" id="hud-p2-chips">20</span>
                        <span class="text-[9px] text-slate-400 tracking-wider">CHIPS</span>
                    </div>
                    <div class="border-l border-slate-700 h-6"></div>
                    <div>
                        <span class="block text-2xl font-black" id="hud-p2-stations">0</span>
                        <span class="text-[9px] text-slate-400 tracking-wider">STATIONS</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-2 space-y-4">
        
        <div class="bg-slate-800 p-2 rounded-xl border border-slate-700 flex flex-wrap justify-between items-center px-4 shadow-sm gap-2">
            <span class="text-xs text-slate-400 font-medium" id="status-hint">Loading layout configuration context...</span>
            <div class="flex items-center gap-3">
                <span class="text-xs text-slate-400 font-bold">Zoom Scale:</span>
                <input type="range" id="zoomSlider" min="0.3" max="2.0" step="0.05" value="0.6" oninput="applyZoomFactor()" class="w-28 accent-teal-500">
                <span class="text-xs font-mono font-bold bg-slate-900 px-1.5 py-0.5 rounded text-teal-400" id="zoomValue">60%</span>
            </div>
        </div>

        <div class="viewport-map-frame rounded-2xl border-2 border-slate-700 shadow-2xl" id="mapFrame">
            <div class="map-canvas-container" id="mapCanvas">
                <img src="map.jpg" alt="Moscow Rail System Canvas Map" class="w-full max-w-none block pointer-events-auto select-none" id="baseMapImg" onclick="handleCanvasInteraction(event)">
                <div id="pins-interaction-layer"></div>
            </div>
        </div>

        <section class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
            <h3 class="text-xs font-bold uppercase tracking-widest text-teal-400 mb-3 flex justify-between items-center">
                <span>Active Station Registry (Alphabetical Order)</span>
                <span id="registry-counter" class="bg-slate-900 text-slate-400 px-2 py-0.5 rounded text-[10px] font-mono">0 Loaded</span>
            </h3>
            <div id="registry-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 text-xs">
                <div class="text-slate-500 italic col-span-full py-2">No stations assigned to map yet. Select Admin role above to add locations.</div>
            </div>
        </section>
    </main>

            { name: "Люблино-D2", lines: ["D2"] },
            { name: "Депо", lines: ["D2"] },
            { name: "Перерва", lines: ["D2"] },
            { name: "Курьяново", lines: ["D2"] },
            { name: "Москворечье", lines: ["D2"] },
            { name: "Покровское", lines: ["D2"] },
            { name: "Красный Строитель", lines: ["D2"] },
            { name: "Битца", lines: ["D2"] },
            { name: "Бутово", lines: ["D2"] },
            { name: "Щербинка", lines: ["D2"] },
            { name: "Остафьево", lines: ["D2"] },
            { name: "Грачёвская", lines: ["D3"] },
            { name: "Моссельмаш", lines: ["D3"] },
            { name: "Сортировочная", lines: ["D3"] },
            { name: "Перово-D3", lines: ["D3", "D4"] },
            { name: "Плющево", lines: ["D3"] },
            { name: "Вешняки", lines: ["D3", "7"] },
            { name: "Косино", lines: ["D3", "7", "15"] },
            { name: "Ухтомская", lines: ["D3"] },
            { name: "Внуково", lines: ["D4"] },
            { name: "Мичуринец", lines: ["D4"] },
            { name: "Переделкино", lines: ["D4"] },
            { name: "Солнечная", lines: ["D4", "D4A"] },
            { name: "Новопеределкино-D4A", lines: ["D4"] },
            { name: "Мещерская", lines: ["D4"] },
            { name: "Очаково", lines: ["D4"] },
            { name: "Матвеевская", lines: ["D4"] },
            { name: "Чухлинка", lines: ["D4", "D3"] },
            { name: "Кусково", lines: ["D4"] }
        ];

        let currentRole = "player1"; // Default role initialization
        let gameRoomId = "moscow-clash-1";
        let localState = {
            players: { 1: { chips: 20, stationsCount: 0 }, 2: { chips: 20, stationsCount: 0 } },
            boundPins: []
        };

        document.addEventListener("DOMContentLoaded", () => {
            applyZoomFactor();
            handleRoleChange();
            initializeLiveSync(); // Auto-start listening on initialization
            
            // Drag and scroll map canvas interaction logic 
            const slider = document.getElementById('mapFrame');
            let isDown = false; let startX, startY, scrollLeft, scrollTop;
            slider.addEventListener('mousedown', (e) => {
                if (e.target.closest('.station-pin')) return;
                isDown = true; startX = e.pageX - slider.offsetLeft; startY = e.pageY - slider.offsetTop;
                scrollLeft = slider.scrollLeft; scrollTop = slider.scrollTop;
            });
            slider.addEventListener('mouseleave', () => isDown = false);
            slider.addEventListener('mouseup', () => isDown = false);
            slider.addEventListener('mousemove', (e) => {
                if(!isDown) return; e.preventDefault();
                const x = e.pageX - slider.offsetLeft; const y = e.pageY - slider.offsetTop;
                slider.scrollLeft = scrollLeft - (x - startX); slider.scrollTop = scrollTop - (y - startY);
            });
        });

        function applyZoomFactor() {
            const val = document.getElementById('zoomSlider').value;
            document.getElementById('zoomValue').textContent = `${Math.round(val * 100)}%`;
            document.getElementById('mapCanvas').style.transform = `scale(${val})`;
        }

        function handleRoleChange() {
            currentRole = document.getElementById('role-selector').value;
            const badge = document.getElementById('mode-status-badge');
            const hint = document.getElementById('status-hint');

            if (currentRole === 'admin') {
                badge.textContent = "SETUP MODE (ADMIN)";
                badge.className = "bg-amber-600 px-3 py-1 rounded font-bold text-white";
                hint.textContent = "Admin Control: Click on map canvas locations to drop predefined stations.";
            } else {
                badge.textContent = "GAME ACTIVE";
                badge.className = "bg-emerald-600 px-3 py-1 rounded font-bold text-white animate-pulse";
                hint.textContent = `Active Role: ${currentRole === 'player1' ? 'Player 1' : 'Player 2'}. Click existing station markers to claim, flip, or track rent.`;
            }
            renderActiveOverlayPins();
        }

        function handleCanvasInteraction(event) {
            if (currentRole !== 'admin') return; // Enforce layout mapping exclusively to admin role
            
            const rect = document.getElementById('baseMapImg').getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 100;
            const y = ((event.clientY - rect.top) / rect.height) * 100;

            let inputSearch = prompt("Type part of the Moscow station name to filter and select:");
            if (!inputSearch) return;

            let matches = MASTER_STATIONS_REGISTRY.filter(s => s.name.toLowerCase().includes(inputSearch.toLowerCase()));
            if (matches.length === 0) { alert("No matching station found in registry!"); return; }
            
            let promptText = "Select exact station index matching:\n";
            matches.forEach((m, idx) => { 
                promptText += `${idx} - ${m.name} - Lines ${m.lines.join(', ')}\n`; 
            });
            let selectionIndex = parseInt(prompt(promptText, "0"));
            
            if (isNaN(selectionIndex) || selectionIndex < 0 || selectionIndex >= matches.length) { alert("Selection canceled."); return; }
            let chosenStation = matches[selectionIndex];

            if (localState.boundPins.some(p => p.name === chosenStation.name)) { alert("This station is already assigned on your system layout map!"); return; }

            const newPin = {
                id: 'station_' + Date.now(),
                x: x, y: y,
                name: chosenStation.name,
                owner: null,
                chips: 0
            };

            localState.boundPins.push(newPin);
            updateCalculationsAndRegistry();
            pushStateToCloudRelay();
        }

        function handlePinInteraction(pinId) {
            const pin = localState.boundPins.find(p => p.id === pinId);
            if (!pin) return;

            if (currentRole === 'admin') {
                if (confirm(`Remove station marker anchor for "${pin.name}"?`)) {
                    localState.boundPins = localState.boundPins.filter(p => p.id !== pinId);
                    updateCalculationsAndRegistry(); 
                    pushStateToCloudRelay();
                }
                return;
            }

            // Game Action Routing based on player actions
            const actingPlayerNum = currentRole === 'player1' ? 1 : 2;
            const opposingPlayerNum = actingPlayerNum === 1 ? 2 : 1;

            let activePromptText = `Station Selected: ${pin.name}\n`;
            activePromptText += `Current Alignment: ${pin.owner ? 'Player ' + pin.owner : 'Neutral (White)'}\n`;
            activePromptText += `Fortification Value resting on Station: ${pin.chips} Chips\n\n`;
            activePromptText += `Choose action path index:\n1 - Claim / Flip Station\n2 - Process Pass-Through Rent (Fails flip check)\n3 - Reset Station to Neutral`;

            let gameSelection = prompt(activePromptText);
            if (!gameSelection) return;

            if (gameSelection === "1") {
                if (pin.owner === null) {
                    // Claiming open neutral station
                    let stake = parseInt(prompt("Enter initial chips to stake on this open station (Allowed bounds: 1 to 5 chips):", "1")) || 1;
                    if (stake < 1 || stake > 5) { alert("Error: Initial neutral claims must be balanced between 1 and 5 chips!"); return; }
                    
                    localState.players[actingPlayerNum].chips -= stake;
                    pin.owner = actingPlayerNum;
                    pin.chips = stake;
                } else if (pin.owner === actingPlayerNum) {
                    // Adding defense to own asset
                    let addChips = parseInt(prompt("Enter additional chips to add to your fortification (Max 5):", "1")) || 1;
                    if (addChips < 1 || addChips > 5) { alert("Must be between 1 and 5 chips."); return; }
                    
                    localState.players[actingPlayerNum].chips -= addChips;
                    pin.chips += addChips;
                } else {
                    // Flipping opponent's territory rules validation logic
                    let requiredMinFlip = pin.chips + 1;
                    let allowedMaxFlip = pin.chips + 5;
                    
                    let flipStakeInput = parseInt(prompt(`Station is held by enemy. Enter total chip stake to flip and fortify this asset (Enforced boundary limits: ${requiredMinFlip} to ${allowedMaxFlip} total chips):`, requiredMinFlip.toString()));
                    
                    if (isNaN(flipStakeInput) || flipStakeInput < requiredMinFlip || flipStakeInput > allowedMaxFlip) {
                        alert(`Error: Flip stake fails validation bounds! Input must be between ${requiredMinFlip} and ${allowedMaxFlip} total chips.`);
                        return;
                    }
                    
                    localState.players[actingPlayerNum].chips -= flipStakeInput;
                    pin.owner = actingPlayerNum;
                    pin.chips = flipStakeInput;
                }
            } else if (gameSelection === "2") {
                // Rulebook compliance: forced pass-through rent handles going negative cleanly
                if (pin.owner === null || pin.owner === actingPlayerNum) {
                    alert("Rent can only be executed if landing on an opponent's station!");
                    return;
                }
                let rentDue = pin.chips;
                localState.players[actingPlayerNum].chips -= rentDue;
                localState.players[opposingPlayerNum].chips += rentDue;
                alert(`Processed rent balance payload: Player ${actingPlayerNum} pays ${rentDue} chips to Player ${opposingPlayerNum}. Balance updated.`);
            } else if (gameSelection === "3") {
                if (confirm("Reset station alignment state to completely unowned?")) {
                    pin.owner = null; 
                    pin.chips = 0;
                }
            }

            updateCalculationsAndRegistry();
            pushStateToCloudRelay();
        }

        function renderActiveOverlayPins() {
            const container = document.getElementById('pins-interaction-layer');
            container.innerHTML = '';

            localState.boundPins.forEach(pin => {
                let node = document.createElement('div');
                node.className = 'station-pin';
                node.style.left = `${pin.x}%`;
                node.style.top = `${pin.y}%`;
                
                if (pin.owner === 1) {
                    node.style.backgroundColor = '#dc2626'; node.style.borderColor = '#ffffff'; node.style.color = '#ffffff';
                } else if (pin.owner === 2) {
                    node.style.backgroundColor = '#2563eb'; node.style.borderColor = '#ffffff'; node.style.color = '#ffffff';
                } else {
                    node.style.backgroundColor = '#ffffff'; node.style.borderColor = '#1e293b'; node.style.color = '#000000';
                }

                node.textContent = pin.chips;
                node.title = pin.name;
                node.onclick = (e) => { e.stopPropagation(); handlePinInteraction(pin.id); };
                container.appendChild(node);
            });
        }

        function updateCalculationsAndRegistry() {
            let p1Stations = 0, p2Stations = 0;
            let sortedPins = [...localState.boundPins].sort((a, b) => a.name.localeCompare(b.name, 'ru'));

            const registryList = document.getElementById('registry-list');
            document.getElementById('registry-counter').textContent = `${sortedPins.length} Anchored`;
            
            if(sortedPins.length === 0) {
                registryList.innerHTML = `<div class="text-slate-500 italic col-span-full py-2">No stations assigned to map yet. Select Admin role above to begin adding locations.</div>`;
            } else {
                registryList.innerHTML = '';
                sortedPins.forEach(pin => {
                    if (pin.owner === 1) p1Stations++;
                    if (pin.owner === 2) p2Stations++;

                    let card = document.createElement('div');
                    card.className = "p-2 rounded-lg flex justify-between items-center transition cursor-pointer ";
                    
                    if(pin.owner === 1) card.className += "bg-red-950/40 border border-red-800 text-red-200";
                    else if(pin.owner === 2) card.className += "bg-blue-950/40 border border-blue-800 text-blue-200";
                    else card.className += "bg-slate-900/60 border border-slate-700 text-slate-300";

                    card.innerHTML = `
                        <span class="font-medium truncate max-w-[180px]" title="${pin.name}">${pin.name}</span>
                        <span class="font-mono text-[10px] font-bold px-1.5 py-0.5 rounded bg-slate-950 shrink-0">
                            ${pin.owner ? `P${pin.owner} • ${pin.chips}🪙` : `Neutral`}
                        </span>
                    `;
                    card.onclick = () => { handlePinInteraction(pin.id); };
                    registryList.appendChild(card);
                });
            }

            localState.players[1].stationsCount = p1Stations;
            localState.players[2].stationsCount = p2Stations;

            document.getElementById('hud-p1-chips').textContent = localState.players[1].chips;
            document.getElementById('hud-p1-stations').textContent = p1Stations;
            document.getElementById('hud-p2-chips').textContent = localState.players[2].chips;
            document.getElementById('hud-p2-stations').textContent = p2Stations;
            
            renderActiveOverlayPins();
        }

        async function initializeLiveSync() {
            const inputVal = document.getElementById('room-id-input').value.trim();
            if(inputVal) gameRoomId = inputVal;
            document.getElementById('sync-indicator').className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
            
            await pullStateFromCloudRelay();
        }

        async function pushStateToCloudRelay() {
            try {
                await fetch(`https://keyvalue.immanual.xyz/api/keyv/${gameRoomId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(localState)
                });
            } catch (err) { console.warn("Sync update drop:", err); }
        }

        async function pullStateFromCloudRelay() {
            try {
                const res = await fetch(`https://keyvalue.immanual.xyz/api/keyv/${gameRoomId}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.players && data.boundPins) {
                        localState = data;
                        updateCalculationsAndRegistry();
                    }
                }
            } catch (err) { console.warn("Listening context frame lag:", err); }
        }

        // Set up infinite structural cloud network background updates
        setInterval(pullStateFromCloudRelay, 2500);
    </script>
